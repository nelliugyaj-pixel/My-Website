<style>
/* General Styles */
body {
    font-family: 'Poppins', Arial, sans-serif;
    margin: 0;
    background: #fff8f5;
    color: #333;
}

/* Header */
header {
    background: #ff6f91;
    color: white;
    padding: 40px 20px;
    text-align: center;
    border-bottom-left-radius: 25px;
    border-bottom-right-radius: 25px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

header h1 {
    margin: 0;
    font-size: 2.2em;
}

header p {
    margin-top: 5px;
    font-size: 1.1em;
    font-style: italic;
}

/* Container */
.container {
    width: 90%;
    max-width: 900px;
    margin: 30px auto;
}

/* Sections */
.section {
    background: #fff0f5;
    padding: 25px;
    margin-bottom: 20px;
    border-radius: 20px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.08);
    transition: transform 0.3s;
}

.section:hover {
    transform: translateY(-5px);
}

/* Section Headings */
.section h2 {
    font-size: 1.6em;
    color: #ff3e6c;
    margin-bottom: 15px;
}

/* Output Links */
.output-link {
    display: block;
    padding: 12px 18px;
    margin-bottom: 12px;
    background: #ffe6f0;
    text-decoration: none;
    color: #ff3e6c;
    border-radius: 12px;
    font-weight: 600;
    transition: all 0.3s ease;
}

.output-link:hover {
    background: #ff3e6c;
    color: white;
    transform: scale(1.05);
}

/* Back Button */
a.button {
    display: inline-block;
    padding: 10px 20px;
    background: #ff6f91;
    color: white;
    text-decoration: none;
    border-radius: 15px;
    font-weight: bold;
    transition: 0.3s ease;
}

a.button:hover {
    background: #ff3e6c;
    transform: scale(1.05);
}

/* Cute emojis in links */
.output-link::before {
    content: "✨ ";
}
</style>
</head>
